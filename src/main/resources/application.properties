spring.application.name=backend

# Database
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:eduvault_db}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:@dhruv123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${FILE_UPLOAD_DIR:/home/dhruv/eduvault-files}
spring.data.web.pageable.serialization-mode=via-dto

# JWT
jwt.secret=${JWT_SECRET:eduvault-secret-key-must-be-at-least-32-characters-long}
jwt.expiration=${JWT_EXPIRATION:2592000000}

